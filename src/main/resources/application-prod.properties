# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=none

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File storage
file.upload-dir=${UPLOAD_DIR:/app/uploads}
file.max-size-bytes=5242880
file.max-images-per-product=10

# Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=60MB

# KPI
kpi.low-stock-threshold=${KPI_LOW_STOCK_THRESHOLD:5}

# Delivery
order.delivery-fee=${ORDER_DELIVERY_FEE:0}
order.free-delivery-threshold=${ORDER_FREE_DELIVERY_THRESHOLD:10000}

# Anthropic API
anthropic.api-key=${ANTHROPIC_API_KEY}

# Server
server.address=0.0.0.0
server.port=${SERVER_PORT:8080}

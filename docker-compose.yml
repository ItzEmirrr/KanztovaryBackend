services:

  # ─── База данных ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: stationery_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: stationery
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d stationery"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Приложение ──────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: stationery_app
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/stationery
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      UPLOAD_DIR: /app/uploads
      ORDER_DELIVERY_FEE: ${ORDER_DELIVERY_FEE:-0}
      ORDER_FREE_DELIVERY_THRESHOLD: ${ORDER_FREE_DELIVERY_THRESHOLD:-10000}
      KPI_LOW_STOCK_THRESHOLD: ${KPI_LOW_STOCK_THRESHOLD:-5}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:
